<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160">
  <rect width="500" height="160" rx="8" fill="#1a1a1a"/>
  <!-- Wind/tailwind lines -->
  <line x1="80" y1="50" x2="180" y2="50" stroke="#f0a500" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="65" x2="200" y2="65" stroke="#f0a500" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="80" x2="190" y2="80" stroke="#f0a500" stroke-width="2" opacity="0.3"/>
  <!-- Stick figure being pushed forward -->
  <g transform="translate(220, 20)">
    <circle cx="30" cy="15" r="12" fill="none" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="30" y1="27" x2="30" y2="65" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="30" y1="40" x2="10" y2="50" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="30" y1="40" x2="50" y2="35" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="30" y1="65" x2="15" y2="90" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="30" y1="65" x2="45" y2="90" stroke="#e0e0e0" stroke-width="2"/>
  </g>
  <!-- Arrow pointing forward -->
  <line x1="300" y1="60" x2="380" y2="60" stroke="#f0a500" stroke-width="2" opacity="0.7"/>
  <polygon points="380,53 395,60 380,67" fill="#f0a500" opacity="0.7"/>
  <text x="250" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#888" font-style="italic">build tailwinds for the people behind you</text>
</svg>
