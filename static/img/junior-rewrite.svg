<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <rect width="500" height="200" fill="#1a1a1a"/>
  <!-- Manager node - enabler -->
  <rect x="50" y="60" width="120" height="50" rx="8" fill="#4a9eff" opacity="0.3"/>
  <text x="110" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#4a9eff">Manager</text>
  <text x="110" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4a9eff" opacity="0.7">stakeholders · air cover</text>
  <!-- Arrow: supports -->
  <line x1="170" y1="85" x2="220" y2="85" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="195" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">enables</text>
  <!-- Priya node - domain lead -->
  <rect x="220" y="60" width="120" height="50" rx="8" fill="#28a745" opacity="0.8"/>
  <text x="280" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a1a" font-weight="600">Priya</text>
  <text x="280" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1a1a1a">technical direction</text>
  <!-- Arrow: leads -->
  <line x1="340" y1="85" x2="390" y2="85" stroke="#28a745" stroke-width="1.5"/>
  <polygon points="390,81 398,85 390,89" fill="#28a745"/>
  <!-- Team node -->
  <rect x="398" y="60" width="70" height="50" rx="8" fill="#333"/>
  <text x="433" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888">Team</text>
  <text x="433" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">trusts · ships</text>
  <!-- Bottom text -->
  <text x="250" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Both lead. Neither pretends.</text>
  <text x="250" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888">the org chart didn't change — the team dynamic did</text>
</svg>
