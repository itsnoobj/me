  <text x="167" y="297" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">4. contract_sync</text>
  <text x="167" y="310" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">5. glossary_check</text>
  <text x="167" y="323" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">6. scope_check</text>
  <text x="167" y="336" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">7. test_spec_refs</text>
  <text x="167" y="349" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">8. adr_required</text>
  <text x="167" y="362" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">9. never_rules</text>
  <text x="167" y="375" font-family="Arial,sans-serif" font-size="9" fill="#1E8449">10. dep_graph_diff</text>
