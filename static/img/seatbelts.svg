    <rect x="15" y="20" width="55" height="25" rx="10" fill="#e0e0e0"/>
    <rect x="5" y="35" width="75" height="20" rx="5" fill="#e0e0e0"/>
    <circle cx="22" cy="58" r="7" fill="#555"/>
    <circle cx="63" cy="58" r="7" fill="#555"/>
  </g>
  <text x="350" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">Build the seatbelts. Then drive.</text>
  <text x="350" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#555">Don't ban the car because it can crash.</text>
