<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <rect width="500" height="220" fill="#1a1a1a"/>
  <!-- Meeting scene -->
  <!-- Lead speaking - big speech bubble, wrong content -->
  <g transform="translate(130, 25)">
    <circle cx="0" cy="20" r="14" fill="#dc3545" opacity="0.9"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#1a1a1a" font-weight="600">LEAD</text>
    <rect x="20" y="2" width="100" height="36" rx="8" fill="#dc3545" opacity="0.2"/>
    <polygon points="20,18 12,22 20,26" fill="#dc3545" opacity="0.2"/>
    <text x="70" y="17" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#dc3545">"Let's use X"</text>
    <text x="70" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#dc3545" opacity="0.7">(hasn't used X)</text>
  </g>
  <!-- Expert - thinking the right answer, staying quiet -->
  <g transform="translate(330, 25)">
    <circle cx="0" cy="20" r="14" fill="#28a745" opacity="0.9"/>
    <text x="0" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#1a1a1a" font-weight="600">EXPERT</text>
    <!-- Thought bubble (not speech) -->
    <circle cx="18" cy="12" r="3" fill="#28a745" opacity="0.2"/>
    <circle cx="25" cy="5" r="4" fill="#28a745" opacity="0.2"/>
    <rect x="33" y="-10" width="100" height="36" rx="12" fill="#28a745" opacity="0.15" stroke="#28a745" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="83" y="4" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#28a745">"X won't work"</text>
    <text x="83" y="17" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#28a745" opacity="0.7">(knows from exp)</text>
  </g>
  <!-- Team members - silent dots -->
  <g transform="translate(100, 95)">
    <circle cx="0" cy="0" r="8" fill="#555"/>
    <text x="0" y="3" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">...</text>
  </g>
  <g transform="translate(200, 95)">
    <circle cx="0" cy="0" r="8" fill="#555"/>
    <text x="0" y="3" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">...</text>
  </g>
  <g transform="translate(300, 95)">
    <circle cx="0" cy="0" r="8" fill="#555"/>
    <text x="0" y="3" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">...</text>
  </g>
  <g transform="translate(400, 95)">
    <circle cx="0" cy="0" r="8" fill="#555"/>
    <text x="0" y="3" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">...</text>
  </g>
  <!-- Divider -->
  <line x1="60" y1="125" x2="440" y2="125" stroke="#333" stroke-width="1"/>
  <!-- 6 weeks later -->
  <text x="250" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#666">6 weeks later</text>
  <text x="250" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#e0e0e0">The expert was right. The team knew.</text>
  <text x="250" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#888">Nobody said anything.</text>
</svg>
