  <!-- Reflection shimmer -->
  <line x1="388" y1="25" x2="388" y2="55" stroke="#9b7fdb" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="15" x2="400" y2="65" stroke="#9b7fdb" stroke-width="1" opacity="0.15"/>
  <line x1="412" y1="25" x2="412" y2="55" stroke="#9b7fdb" stroke-width="1" opacity="0.25"/>
  <!-- Stand -->
  <line x1="400" y1="80" x2="400" y2="90" stroke="#9b7fdb" stroke-width="2"/>
  <line x1="385" y1="90" x2="415" y2="90" stroke="#9b7fdb" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#9b7fdb">Self &amp; Identity</text>
