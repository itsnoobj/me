<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>
  <g transform="translate(220, 20)">
    <!-- Bar 1: Germane -->
    <rect x="0" y="10" width="24" height="60" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="0" y="30" width="24" height="40" rx="0" fill="#28a745" opacity="0.7"/>
    <text x="12" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#28a745">Germane</text>
    <!-- Bar 2: Intrinsic -->
    <rect x="55" y="10" width="24" height="60" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="55" y="20" width="24" height="50" rx="0" fill="#f0a500" opacity="0.7"/>
    <text x="67" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f0a500">Intrinsic</text>
    <!-- Bar 3: Extraneous -->
    <rect x="110" y="10" width="24" height="60" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="110" y="12" width="24" height="58" rx="0" fill="#dc3545" opacity="0.7"/>
    <text x="122" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#dc3545">Extraneous</text>
    <!-- Arrow -->
    <line x1="160" y1="40" x2="210" y2="40" stroke="#4a9eff" stroke-width="1.5"/>
    <polygon points="210,36 220,40 210,44" fill="#4a9eff"/>
    <!-- Agent nodes -->
    <circle cx="250" cy="25" r="10" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="250" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4a9eff">A</text>
    <circle cx="250" cy="58" r="10" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="250" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4a9eff">A</text>
    <line x1="250" y1="35" x2="250" y2="48" stroke="#4a9eff" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="250" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4a9eff">Agents</text>
  </g>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#888">from building to orchestrating</text>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">Cognitive Load in the Age of Agents</text>
</svg>
