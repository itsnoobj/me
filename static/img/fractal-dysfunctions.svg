<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6f0"/>
      <stop offset="100%" stop-color="#f0e6d8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="560" fill="url(#bgGrad)"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#3a2a1a">The Five Dysfunctions — Scaled to the Boundary</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#7a6a5a" font-style="italic">What it sounds like between teams</text>

  <!-- Row 1 -->
  <g transform="translate(50, 75)">
    <circle cx="20" cy="22" r="20" fill="#c45a3c" opacity="0.12"/>
    <text x="20" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#c45a3c">1</text>
    <text x="55" y="18" font-size="15" font-weight="bold" fill="#3a2a1a">Absence of Trust</text>
    <text x="55" y="37" font-size="12" fill="#5a4a3a">Teams hide capacity limits and deployment failures from each other.</text>
    <text x="55" y="54" font-size="12" fill="#5a4a3a">Vulnerability across boundaries feels dangerous — so everyone plays it safe.</text>
    <rect x="55" y="62" width="680" height="22" rx="4" fill="#c45a3c" opacity="0.05"/>
    <text x="65" y="78" font-size="11.5" fill="#c45a3c" font-style="italic">"We can't admit we're drowning. That becomes ammunition."</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(50, 175)">
    <circle cx="20" cy="22" r="20" fill="#d4853c" opacity="0.12"/>
    <text x="20" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#d4853c">2</text>
    <text x="55" y="18" font-size="15" font-weight="bold" fill="#3a2a1a">Fear of Conflict</text>
    <text x="55" y="37" font-size="12" fill="#5a4a3a">Joint planning avoids hard trade-offs. Everyone nods along.</text>
    <text x="55" y="54" font-size="12" fill="#5a4a3a">Incompatible assumptions surface three months later — in production.</text>
    <rect x="55" y="62" width="680" height="22" rx="4" fill="#d4853c" opacity="0.05"/>
    <text x="65" y="78" font-size="11.5" fill="#d4853c" font-style="italic">"Their design won't scale — but it's not our place to say."</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(50, 275)">
    <circle cx="20" cy="22" r="20" fill="#c4963c" opacity="0.12"/>
    <text x="20" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#c4963c">3</text>
    <text x="55" y="18" font-size="15" font-weight="bold" fill="#3a2a1a">Lack of Commitment</text>
    <text x="55" y="37" font-size="12" fill="#5a4a3a">Verbal agreement in PI planning. Quiet prioritisation of local backlog.</text>
    <text x="55" y="54" font-size="12" fill="#5a4a3a">Shared integration work sits untouched for six sprints.</text>
    <rect x="55" y="62" width="680" height="22" rx="4" fill="#c4963c" opacity="0.05"/>
    <text x="65" y="78" font-size="11.5" fill="#c4963c" font-style="italic">"Yeah we agreed — but our stakeholders need this first."</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(50, 375)">
    <circle cx="20" cy="22" r="20" fill="#7a6a5a" opacity="0.12"/>
    <text x="20" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#7a6a5a">4</text>
    <text x="55" y="18" font-size="15" font-weight="bold" fill="#3a2a1a">Avoidance of Accountability</text>
    <text x="55" y="37" font-size="12" fill="#5a4a3a">Nobody calls out the late upstream team directly.</text>
    <text x="55" y="54" font-size="12" fill="#5a4a3a">Everything escalates to management. The org chart becomes conflict resolution.</text>
    <rect x="55" y="62" width="680" height="22" rx="4" fill="#7a6a5a" opacity="0.05"/>
    <text x="65" y="78" font-size="11.5" fill="#7a6a5a" font-style="italic">"Not our place to call them out. Let leadership sort it."</text>
  </g>

  <!-- Row 5 -->
  <g transform="translate(50, 475)">
    <circle cx="20" cy="22" r="20" fill="#4a6a8a" opacity="0.12"/>
    <text x="20" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#4a6a8a">5</text>
    <text x="55" y="18" font-size="15" font-weight="bold" fill="#3a2a1a">Inattention to Results</text>
    <text x="55" y="37" font-size="12" fill="#5a4a3a">Every team's velocity is green. Every retro says "we're doing well."</text>
    <text x="55" y="54" font-size="12" fill="#5a4a3a">Customer waits 8 weeks for a feature that touches three services.</text>
    <rect x="55" y="62" width="680" height="22" rx="4" fill="#4a6a8a" opacity="0.05"/>
    <text x="65" y="78" font-size="11.5" fill="#4a6a8a" font-style="italic">"Our metrics are green. The end-to-end wait is their problem."</text>
  </g>
</svg>
