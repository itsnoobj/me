<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <rect width="600" height="280" fill="#1a1a1a"/>
  <!-- 5 tactics as compact icons with labels -->
  <!-- 1. Write it down -->
  <g transform="translate(60, 30)">
    <rect x="0" y="0" width="36" height="44" rx="4" fill="#4a9eff" opacity="0.8"/>
    <line x1="8" y1="12" x2="28" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="8" y1="20" x2="28" y2="20" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="8" y1="28" x2="20" y2="28" stroke="#1a1a1a" stroke-width="2"/>
    <text x="18" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4a9eff">Write first</text>
    <text x="18" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">before the meeting</text>
  </g>
  <!-- Arrow -->
  <line x1="110" y1="45" x2="140" y2="45" stroke="#444" stroke-width="1.5"/>
  <polygon points="140,41 148,45 140,49" fill="#444"/>
  <!-- 2. Small wins -->
  <g transform="translate(160, 30)">
    <text x="18" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" fill="#28a745">✓</text>
    <text x="30" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" fill="#28a745" opacity="0.7">✓</text>
    <text x="8" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#28a745" opacity="0.5">✓</text>
    <text x="18" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#28a745">Small wins</text>
    <text x="18" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">be right, visibly</text>
  </g>
  <!-- Arrow -->
  <line x1="210" y1="45" x2="240" y2="45" stroke="#444" stroke-width="1.5"/>
  <polygon points="240,41 248,45 240,49" fill="#444"/>
  <!-- 3. Questions -->
  <g transform="translate(260, 30)">
    <text x="18" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="300" fill="#f0a500">?</text>
    <text x="18" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#f0a500">Ask, don't tell</text>
    <text x="18" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">offer to do work</text>
  </g>
  <!-- Arrow -->
  <line x1="310" y1="45" x2="340" y2="45" stroke="#444" stroke-width="1.5"/>
  <polygon points="340,41 348,45 340,49" fill="#444"/>
  <!-- 4. Co-opt -->
  <g transform="translate(360, 30)">
    <circle cx="10" cy="22" r="10" fill="#dc3545" opacity="0.7"/>
    <circle cx="26" cy="22" r="10" fill="#28a745" opacity="0.7"/>
    <!-- Overlap -->
    <text x="18" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#e0e0e0">Co-opt</text>
    <text x="18" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">make them look good</text>
  </g>
  <!-- Arrow -->
  <line x1="410" y1="45" x2="440" y2="45" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,41 448,45 440,49" fill="#444"/>
  <!-- 5. Escalate -->
  <g transform="translate(460, 30)">
    <line x1="18" y1="40" x2="0" y2="10" stroke="#888" stroke-width="2"/>
    <line x1="18" y1="40" x2="36" y2="10" stroke="#888" stroke-width="2"/>
    <circle cx="0" cy="8" r="6" fill="#888"/>
    <circle cx="36" cy="8" r="6" fill="#888"/>
    <circle cx="18" cy="42" r="6" fill="#28a745"/>
    <text x="18" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">Go beside</text>
    <text x="18" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">not over</text>
  </g>
  <!-- Bottom summary -->
  <line x1="40" y1="110" x2="560" y2="110" stroke="#333" stroke-width="1"/>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#e0e0e0">Influence Without Authority</text>
  <text x="300" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#888">the five real moves when you're right but not in charge</text>
  <!-- Cialdini principles mapped -->
  <text x="78" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4a9eff" opacity="0.7">commitment</text>
  <text x="178" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#28a745" opacity="0.7">social proof</text>
  <text x="278" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f0a500" opacity="0.7">reframing</text>
  <text x="378" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e0e0e0" opacity="0.7">reciprocity</text>
  <text x="478" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888" opacity="0.7">lateral move</text>
</svg>
