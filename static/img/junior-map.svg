<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <rect width="500" height="220" fill="#1a1a1a"/>
  <!-- Left: mental model A (backend) -->
  <g transform="translate(70, 25)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a1a" stroke="#4a9eff" stroke-width="1.5"/>
    <!-- Nodes and connections (system diagram) -->
    <circle cx="30" cy="25" r="8" fill="#4a9eff" opacity="0.8"/>
    <circle cx="90" cy="25" r="8" fill="#4a9eff" opacity="0.8"/>
    <circle cx="60" cy="55" r="8" fill="#4a9eff" opacity="0.8"/>
    <line x1="30" y1="25" x2="90" y2="25" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="25" x2="60" y2="55" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <line x1="90" y1="25" x2="60" y2="55" stroke="#4a9eff" stroke-width="1" opacity="0.5"/>
    <text x="60" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4a9eff">System A</text>
    <text x="60" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">10 years experience</text>
  </g>
  <!-- Arrow: applies to -->
  <g transform="translate(210, 50)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#dc3545" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="60,-4 68,0 60,4" fill="#dc3545"/>
    <text x="30" y="-8" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#dc3545">applies</text>
    <text x="30" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#dc3545">✗</text>
  </g>
  <!-- Right: system B (frontend) — different shape -->
  <g transform="translate(300, 25)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a1a1a" stroke="#f0a500" stroke-width="1.5"/>
    <!-- Different topology -->
    <circle cx="20" cy="20" r="6" fill="#f0a500" opacity="0.8"/>
    <circle cx="60" cy="15" r="10" fill="#f0a500" opacity="0.8"/>
    <circle cx="100" cy="25" r="6" fill="#f0a500" opacity="0.8"/>
    <circle cx="40" cy="55" r="8" fill="#f0a500" opacity="0.8"/>
    <circle cx="80" cy="60" r="5" fill="#f0a500" opacity="0.8"/>
    <line x1="20" y1="20" x2="60" y2="15" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="15" x2="100" y2="25" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="15" x2="40" y2="55" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
    <line x1="40" y1="55" x2="80" y2="60" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
    <text x="60" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#f0a500">System B</text>
    <text x="60" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#666">different loops, different leverage</text>
  </g>
  <!-- Bottom text -->
  <text x="250" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">The map of one system doesn't work in another</text>
  <text x="250" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#888">confidence from System A becomes misapplication in System B</text>
</svg>
