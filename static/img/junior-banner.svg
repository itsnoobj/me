<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>
  <!-- Org chart with wrong person highlighted -->
  <!-- Top node (senior - highlighted wrong) -->
  <rect x="365" y="20" width="70" height="35" rx="6" fill="#dc3545" opacity="0.9"/>
  <text x="400" y="43" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1a1a1a" font-weight="600">LEAD?</text>
  <!-- Lines down -->
  <line x1="385" y1="55" x2="310" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="400" y1="55" x2="400" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="415" y1="55" x2="490" y2="80" stroke="#555" stroke-width="1.5"/>
  <!-- Left node -->
  <rect x="275" y="80" width="70" height="30" rx="6" fill="#333" opacity="0.9"/>
  <text x="310" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">Sr. Eng</text>
  <!-- Middle node (the actual expert - glowing) -->
  <rect x="365" y="80" width="70" height="30" rx="6" fill="#28a745" opacity="0.9"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1a1a1a" font-weight="600">Expert</text>
  <!-- Right node -->
  <rect x="455" y="80" width="70" height="30" rx="6" fill="#333" opacity="0.9"/>
  <text x="490" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">Sr. Eng</text>
  <!-- Swap arrow -->
  <path d="M435,42 Q470,42 470,65 Q470,88 440,88" stroke="#f0a500" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="440,83 428,88 440,93" fill="#f0a500"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#888">everybody is junior in something</text>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">Even a Junior Is the Expert at Something</text>
</svg>
