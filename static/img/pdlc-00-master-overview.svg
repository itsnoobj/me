<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E74C3C"/>
    </marker>
  </defs>
  <rect width="1500" height="500" fill="#FFFFFF"/>
  <text x="750" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#2C3E50">AI-Native PDLC — Reliability at Every Step</text>
  <text x="750" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#666">Maker owns judgment. Agent owns execution. Specs are the source of truth.</text>
  <rect x="40" y="120" width="135" height="70" rx="8" fill="#F5F5F5" stroke="#bbb" stroke-width="1"/>
  <text x="107" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">0. Requirements</text>
  <text x="107" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Propose → Refine</text>
  <line x1="177" y1="155" x2="187" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="189" y="120" width="135" height="70" rx="8" fill="#EBF5FB" stroke="#bbb" stroke-width="1"/>
  <text x="256" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">1. Discover</text>
  <text x="256" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Interview → Specs</text>
  <line x1="326" y1="155" x2="336" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="338" y="120" width="135" height="70" rx="8" fill="#E8DAEF" stroke="#bbb" stroke-width="1"/>
  <text x="405" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">2. Architecture</text>
  <text x="405" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">RFC → ADR</text>
  <line x1="475" y1="155" x2="485" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="487" y="120" width="135" height="70" rx="8" fill="#FEF9E7" stroke="#bbb" stroke-width="1"/>
  <text x="554" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">3. Context</text>
  <text x="554" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Scope → Session</text>
  <line x1="624" y1="155" x2="634" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="636" y="120" width="135" height="70" rx="8" fill="#D5F5E3" stroke="#bbb" stroke-width="1"/>
  <text x="703" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">4. TDD-First</text>
  <text x="703" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Tests → Impl</text>
  <line x1="773" y1="155" x2="783" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="785" y="120" width="135" height="70" rx="8" fill="#D6EAF8" stroke="#bbb" stroke-width="1"/>
  <text x="852" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">5. Commit</text>
  <text x="852" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Atomic → PR</text>
  <line x1="922" y1="155" x2="932" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="934" y="120" width="135" height="70" rx="8" fill="#EAFAF1" stroke="#bbb" stroke-width="1"/>
  <text x="1001" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">6. CI Gates</text>
  <text x="1001" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">10 Checks → Merge</text>
  <line x1="1071" y1="155" x2="1081" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="1083" y="120" width="135" height="70" rx="8" fill="#FCF3CF" stroke="#bbb" stroke-width="1"/>
  <text x="1150" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">7. Evaluate</text>
  <text x="1150" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Deploy → +7d → Learn</text>
  <line x1="1220" y1="155" x2="1230" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="1232" y="120" width="135" height="70" rx="8" fill="#FADBD8" stroke="#bbb" stroke-width="1"/>
  <text x="1299" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">8. Knowledge</text>
  <text x="1299" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#555">Pattern → Skill</text>
  <path d="M 1150,192 L 1150,210 L 107,210 L 107,192" fill="none" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="750" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#E74C3C">🔄 Continuous improvement loop — every gap feeds back into specs &amp; skills</text>
  <line x1="50" y1="260" x2="1450" y2="260" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="70" y="275" width="90" height="28" rx="4" fill="#4A90D9"/>
  <text x="115" y="293" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Maker</text>
  <text x="200" y="293" font-family="Arial,sans-serif" font-size="11" fill="#2C3E50">Vision · Review · Approve · Architecture decisions · Outcome verification</text>
  <rect x="70" y="315" width="90" height="28" rx="4" fill="#27AE60"/>
  <text x="115" y="333" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Agent</text>
  <text x="200" y="333" font-family="Arial,sans-serif" font-size="11" fill="#2C3E50">Interview · Draft · Implement · Test · Validate · Deploy · Encode skills</text>
  <rect x="70" y="355" width="90" height="28" rx="4" fill="#757575"/>
  <text x="115" y="373" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Artifacts</text>
  <text x="200" y="373" font-family="Arial,sans-serif" font-size="11" fill="#2C3E50">Specs · ADRs · Tests · Code · NEVER.md · Skills · CHANGELOG · Dep graphs</text>
  <line x1="50" y1="430" x2="1450" y2="430" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="750" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#666">Specs are truth · Architecture = human judgment · TDD as contract · Deterministic checks &gt; agentic judgment · Knowledge explicit, never in prompts</text>
</svg>