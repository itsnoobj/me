<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="#1a1a1a"/>
  <g transform="translate(340, 20)">
    <!-- Key shape -->
    <circle cx="60" cy="35" r="18" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <circle cx="60" cy="35" r="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <line x1="78" y1="35" x2="130" y2="35" stroke="#4a9eff" stroke-width="2"/>
    <line x1="115" y1="35" x2="115" y2="48" stroke="#4a9eff" stroke-width="2"/>
    <line x1="125" y1="35" x2="125" y2="45" stroke="#4a9eff" stroke-width="2"/>
    <!-- Question mark inside key ring -->
    <text x="60" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#4a9eff">?</text>
    <!-- Scattered small question marks -->
    <text x="10" y="70" font-family="system-ui,sans-serif" font-size="11" fill="#555">?</text>
    <text x="150" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#555">?</text>
    <text x="0" y="15" font-family="system-ui,sans-serif" font-size="9" fill="#444">?</text>
    <text x="140" y="70" font-family="system-ui,sans-serif" font-size="9" fill="#444">?</text>
  </g>
  <text x="400" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#888">a self-journal of better questions</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#e0e0e0">Questions That Reframe Everything</text>
</svg>
